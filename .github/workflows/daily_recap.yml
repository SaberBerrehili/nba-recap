name: Daily NBA Recap

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  recap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install requirements
        run: pip install -r requirements.txt

      - name: Run script
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: python main.py $(date -d "yesterday" +%Y-%m-%d)

      - name: Remove old recap and push new one
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git rm --ignore-unmatch Recap_*.md
          git add Recap_*.md
          git commit -m "recap: $(date -d 'yesterday' +%Y-%m-%d)"
          git push
