name: Daily NBA Recap

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  recap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Installing requirements.txt
        run : pip install -r requirements.txt
      - name: Run script 
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run : python main.py $(date -d "yesterday" +%Y-%m-%d)